<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Translator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <label class="field">
        <span>目标语言</span>
        <select id="targetLanguage">
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁体中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
        </select>
      </label>

      <button id="translateButton" class="primary" type="button">翻译当前页</button>

      <div class="mode-actions">
        <button type="button" data-mode="original">原文</button>
        <button type="button" data-mode="bilingual">双语</button>
        <button type="button" data-mode="translated">译文</button>
      </div>

      <p id="status" class="status">准备就绪</p>

      <div class="footer-actions">
        <button id="openShortcutsButton" type="button">快捷键</button>
        <button id="openOptionsButton" type="button">设置</button>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
